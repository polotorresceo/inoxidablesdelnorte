/* ════════════════ SELECT ════════════════ */
function Select({placeholder, options, value, onChange, accentColor=G, accentLight=GL}) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const fn = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);

  return (
    <div ref={ref} style={{position:"relative",width:"100%"}}>
      <button onClick={() => setOpen(o=>!o)} style={{
        width:"100%",
        background: value?`rgba(${accentColor==="rgb(0,180,216)"?"0,180,216":"201,168,76"},.12)`:`rgba(${accentColor==="rgb(0,180,216)"?"0,180,216":"201,168,76"},.06)`,
        border:`1px solid ${value?`${accentColor}99`:`${accentColor}40`}`,
        color: value?accentLight:"rgba(247,240,224,.55)",
        padding:"11px 14px 11px 16px", borderRadius:7,
        fontFamily:"Montserrat,sans-serif", fontSize:".81rem",
        cursor:"pointer", textAlign:"left",
        display:"flex", justifyContent:"space-between", alignItems:"center",
        transition:"all .2s", gap:8
      }}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{value||placeholder}</span>
        <span style={{color:accentColor,fontSize:".65rem",flexShrink:0,
          transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>▼</span>
      </button>

      {open && (
        <div style={{
          position:"absolute",top:"calc(100% + 5px)",left:0,right:0,
          background:"#1c1508",border:`1px solid ${accentColor}66`,
          borderRadius:7,maxHeight:245,overflowY:"auto",zIndex:500,
          boxShadow:"0 12px 50px rgba(0,0,0,.7)",animation:"fadeUp .15s ease"
        }}>
          {options.map(opt => (
            <div key={opt} onClick={() => {onChange(opt); setOpen(false);}}
              style={{
                padding:"9px 16px",fontSize:".79rem",cursor:"pointer",
                borderBottom:"1px solid rgba(255,255,255,.04)",
                color: opt===value?accentLight:CREAM,
                background: opt===value?`${accentColor}33`:"transparent",
                transition:"background .12s"
              }}
              onMouseEnter={e=>{if(opt!==value)e.currentTarget.style.background=`${accentColor}1a`;}}
              onMouseLeave={e=>{if(opt!==value)e.currentTarget.style.background="transparent";}}
            >{opt}</div>
          ))}
        </div>
      )}

      {value && (
        <div style={{marginTop:5}}>
          <span style={{
            background:`${accentColor}26`,border:`1px solid ${accentColor}66`,
            color:accentLight,fontSize:".68rem",padding:"3px 10px",borderRadius:20,
            display:"inline-block",maxWidth:"100%",
            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"
          }}>✓ {value}</span>
        </div>
      )}
    </div>
  );
}

                        transition:"all .2s"}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor=`${accentC}66`;e.currentTarget.style.color=CREAM;}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,.07)";e.currentTarget.style.color="rgba(255,255,255,.55)";}}>
                      <div style={{display:"flex",gap:5,marginBottom:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:".59rem",background:`${item.cat==="fit"?FIT:G}33`,
                          color:item.cat==="fit"?FITL:G,padding:"2px 7px",borderRadius:20,
                          display:"inline-block",letterSpacing:".06em",textTransform:"uppercase"}}>
                          {item.cat==="fit"?"💪 Fit":"🫕 Mx"}
                        </span>
                        <span style={{fontSize:".59rem",background:"rgba(255,255,255,.08)",
                          color:"rgba(255,255,255,.5)",padding:"2px 7px",borderRadius:20,
                          display:"inline-block",overflow:"hidden",textOverflow:"ellipsis",
                          whiteSpace:"nowrap",maxWidth:110}}>
                          {item.plat.slice(0,20)}
                        </span>
                      </div>
                      {item.preview}
                    </div>
                  ))}
                </div>
            }
          </div>

        </div>
      </div>

      {/* ══ TOAST ══ */}
      <div style={{position:"fixed",bottom:24,right:24,
        background:GRN,color:"#fff",padding:"12px 22px",borderRadius:9,
        fontSize:".81rem",fontWeight:600,
        opacity:toast.on?1:0,
        transform:toast.on?"translateY(0)":"translateY(10px)",
        transition:"all .3s",zIndex:999,pointerEvents:"none",
        boxShadow:"0 4px 20px rgba(0,0,0,.4)"}}>
        {toast.msg}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
